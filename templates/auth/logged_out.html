<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesión cerrada — CineWorld</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F2F2F7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.07)}
    .icon{width:64px;height:64px;border-radius:18px;background:rgba(48,209,88,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
    p{color:#6E6E73;font-size:15px;line-height:1.6}
    .btn{display:inline-block;margin-top:28px;padding:13px 32px;background:#0A84FF;color:#fff;border-radius:12px;text-decoration:none;font-size:15px;font-weight:700;transition:all .2s}
    .btn:hover{background:#0070e0;transform:translateY(-1px)}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#30D158">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <h1>Sesión cerrada</h1>
  <p>Tu sesión se cerró correctamente.<br>¡Hasta pronto!</p>
  <a href="/login" class="btn">Volver a iniciar sesión</a>
</div>
<script>setTimeout(() => { window.location.replace('/login'); }, 3000);</script>
</body>
</html>
